<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Proxy</title>
  <style>
    body {
      background: #0a0a0f;
      color: #ddd;
      font-family: monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: #111;
      padding: 2rem;
      border-radius: 12px;
      border: 1px solid #2a2a3a;
      box-shadow: 0 0 20px rgba(75, 0, 130, 0.3);
      width: 400px;
      text-align: center;
    }
    h1 {
      color: #a55eff;
      text-shadow: 0 0 5px #3a0ca3;
    }
    input, button {
      background: #1e1e2a;
      border: 1px solid #2e2e3a;
      color: #fff;
      padding: 10px;
      margin: 10px 0;
      width: 100%;
      border-radius: 8px;
    }
    button {
      background: #3a0ca3;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      background: #5a2ecc;
      box-shadow: 0 0 8px #7b2cbf;
    }
    #result {
      margin-top: 20px;
      background: #000000aa;
      padding: 10px;
      border-radius: 8px;
      word-break: break-all;
    }
    a {
      color: #b77eff;
    }
    .file-status {
      font-size: 0.9rem;
      color: #77ff77;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>⚡ DARK PROXY ⚡</h1>
  <input type="file" id="fileInput" accept="image/*,video/*">
  <div id="fileStatus" class="file-status">📁 Belum ada file dipilih</div>
  <button id="uploadBtn">⬆ UPLOAD</button>
  <div id="result"></div>
</div>

<script>
  const fileInput = document.getElementById('fileInput');
  const fileStatus = document.getElementById('fileStatus');
  const uploadBtn = document.getElementById('uploadBtn');
  const resultDiv = document.getElementById('result');

  let selectedFile = null;

  fileInput.addEventListener('change', (e) => {
    selectedFile = e.target.files[0];
    if (selectedFile) {
      fileStatus.innerHTML = `✅ File siap: ${selectedFile.name} (${(selectedFile.size / 1024).toFixed(2)} KB)`;
    } else {
      fileStatus.innerHTML = `📁 Belum ada file dipilih`;
    }
  });

  uploadBtn.addEventListener('click', async () => {
    if (!selectedFile) {
      resultDiv.innerHTML = '<span style="color:#ff7777">❌ Pilih file dulu!</span>';
      return;
    }

    const formData = new FormData();
    formData.append('file', selectedFile);

    resultDiv.innerHTML = '⏳ Memproses...';

    try {
      const res = await fetch('/upload', {
        method: 'POST',
        body: formData
      });
      const data = await res.json();
      if (data.proxyUrl) {
        resultDiv.innerHTML = `
          <div>✅ Sukses!</div>
          <div>🔗 Proxy: <a href="${data.proxyUrl}" target="_blank">${data.proxyUrl}</a></div>
          <div>📦 Base64 (potongan): ${data.base64.substring(0, 80)}...</div>
        `;
      } else {
        resultDiv.innerHTML = `<span style="color:#ff7777">❌ Error: ${data.error}</span>`;
      }
    } catch (err) {
      resultDiv.innerHTML = `<span style="color:#ff7777">❌ Gagal upload: ${err.message}</span>`;
    }
  });
</script>
</body>
</html>
