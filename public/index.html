<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Proxy - File to Base64 & Short Link</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0a0f 0%, #050508 100%);
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: rgba(10, 10, 20, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid #2a1a4a;
      box-shadow: 0 0 50px rgba(75, 0, 130, 0.5);
      padding: 40px;
      width: 100%;
      max-width: 500px;
    }

    h1 {
      text-align: center;
      color: #b87cff;
      font-size: 2em;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #4a0e8a;
    }

    .subtitle {
      text-align: center;
      color: #6a4e8a;
      margin-bottom: 30px;
      font-size: 0.8em;
    }

    .file-area {
      background: #0f0f1a;
      border: 2px dashed #3a2a5a;
      border-radius: 15px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 20px;
    }

    .file-area:hover {
      border-color: #8a6eff;
      background: #15152a;
    }

    .file-area input {
      display: none;
    }

    .file-label {
      cursor: pointer;
      color: #b87cff;
      font-size: 1.1em;
    }

    .file-status {
      background: #0a0a12;
      padding: 12px;
      border-radius: 10px;
      margin: 15px 0;
      text-align: center;
      color: #6aff9e;
      font-size: 0.9em;
      border-left: 3px solid #6aff9e;
    }

    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #4a0e8a 0%, #8a2be2 100%);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
      margin: 10px 0;
      font-family: monospace;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(138, 43, 226, 0.4);
    }

    .result {
      background: #0a0a12;
      border-radius: 10px;
      padding: 20px;
      margin-top: 20px;
      word-break: break-all;
      border: 1px solid #2a1a4a;
    }

    .result a {
      color: #b87cff;
      text-decoration: none;
      border-bottom: 1px solid #b87cff;
    }

    .loading {
      text-align: center;
      color: #ffcc44;
    }

    .error {
      color: #ff6666;
    }

    .success {
      color: #66ff99;
    }

    hr {
      border-color: #2a1a4a;
      margin: 15px 0;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>⚡ DARK PROXY ⚡</h1>
  <div class="subtitle">Convert to Base64 & Short Link</div>

  <div class="file-area" onclick="document.getElementById('fileInput').click()">
    <input type="file" id="fileInput" accept="image/*,video/*">
    <div class="file-label">📁 CLICK TO SELECT FILE</div>
    <div style="font-size: 0.8em; margin-top: 10px; color: #6a4e8a;">Image or Video</div>
  </div>

  <div id="fileStatus" class="file-status">⚡ No file selected</div>

  <button id="uploadBtn">🚀 UPLOAD & CONVERT</button>

  <div id="result" class="result"></div>
</div>

<script>
  const fileInput = document.getElementById('fileInput');
  const fileStatus = document.getElementById('fileStatus');
  const uploadBtn = document.getElementById('uploadBtn');
  const resultDiv = document.getElementById('result');

  let selectedFile = null;

  fileInput.addEventListener('change', (e) => {
    selectedFile = e.target.files[0];
    if (selectedFile) {
      const fileSizeMB = (selectedFile.size / (1024 * 1024)).toFixed(2);
      const fileType = selectedFile.type.split('/')[0];
      fileStatus.innerHTML = `✅ SELECTED: ${selectedFile.name} (${fileSizeMB} MB) - Type: ${fileType.toUpperCase()}`;
      fileStatus.style.borderLeftColor = '#66ff99';
    } else {
      fileStatus.innerHTML = '⚡ No file selected';
      fileStatus.style.borderLeftColor = '#6aff9e';
    }
  });

  uploadBtn.addEventListener('click', async () => {
    if (!selectedFile) {
      resultDiv.innerHTML = '<div class="error">❌ ERROR: Please select a file first!</div>';
      return;
    }

    resultDiv.innerHTML = '<div class="loading">⏳ PROCESSING... Converting to Base64 & generating short link...</div>';

    const formData = new FormData();
    formData.append('file', selectedFile);

    try {
      const response = await fetch('/upload', {
        method: 'POST',
        body: formData
      });

      const data = await response.json();

      if (response.ok && data.proxyUrl) {
        const fullUrl = window.location.origin + data.proxyUrl;
        resultDiv.innerHTML = `
          <div class="success">✅ SUCCESS!</div>
          <hr>
          <div>🔗 SHORT LINK:</div>
          <div><a href="${fullUrl}" target="_blank">${fullUrl}</a></div>
          <hr>
          <div>📦 BASE64 (preview):</div>
          <div style="font-size: 0.7em; opacity: 0.8;">${data.base64}</div>
        `;
      } else {
        resultDiv.innerHTML = `<div class="error">❌ ERROR: ${data.error || 'Unknown error'}</div>`;
      }
    } catch (error) {
      resultDiv.innerHTML = `<div class="error">❌ NETWORK ERROR: ${error.message}</div>`;
    }
  });
</script>
</body>
</html>
